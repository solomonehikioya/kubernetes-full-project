apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: dev
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Kubernetes Full Stack Dashboard</title>
      <style>
        body {
          margin: 0;
          font-family: 'Segoe UI', Arial, sans-serif;
          background: linear-gradient(135deg, #0f172a, #1e293b);
          color: white;
        }

        .container {
          max-width: 900px;
          margin: 80px auto;
          text-align: center;
        }

        h1 {
          font-size: 42px;
          margin-bottom: 10px;
        }

        p.subtitle {
          color: #94a3b8;
          margin-bottom: 40px;
        }

        .card {
          background: rgba(255, 255, 255, 0.05);
          padding: 25px;
          border-radius: 12px;
          box-shadow: 0 8px 25px rgba(0,0,0,0.3);
          margin-bottom: 20px;
          backdrop-filter: blur(10px);
        }

        .status {
          font-size: 18px;
          margin: 15px 0;
          color: #38bdf8;
        }

        button {
          padding: 12px 25px;
          font-size: 16px;
          background: linear-gradient(90deg, #06b6d4, #3b82f6);
          border: none;
          border-radius: 8px;
          cursor: pointer;
          color: white;
          transition: 0.3s;
        }

        button:hover {
          transform: scale(1.05);
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
          gap: 20px;
          margin-top: 30px;
        }

        .mini-card {
          background: rgba(255,255,255,0.07);
          padding: 20px;
          border-radius: 10px;
        }

        .footer {
          margin-top: 50px;
          font-size: 12px;
          color: #64748b;
        }
      </style>
    </head>

    <body>

      <div class="container">

        <h1>Kubernetes Full Stack App</h1>
        <p class="subtitle">Frontend - Backend - MongoDB - Docker - K8s</p>

        <div class="card">
          <h2>Backend Connection Test</h2>
          <p id="status" class="status">Click the button to test backend API</p>
          <button onclick="checkBackend()">Test API Connection</button>
        </div>

        <div class="grid">

          <div class="mini-card">
            <h3>Frontend</h3>
            <p>Served via Nginx + ConfigMap</p>
          </div>

          <div class="mini-card">
            <h3>Backend</h3>
            <p>Node.js API running in Kubernetes</p>
          </div>

          <div class="mini-card">
            <h3>Database</h3>
            <p>MongoDB StatefulSet with persistence</p>
          </div>

        </div>

        <div class="footer">
          Built with Kubernetes • Docker Desktop • DevOps Pipeline Simulation
        </div>

      </div>

      <script>
        function checkBackend() {
          fetch("/api")
            .then(res => res.text())
            .then(data => {
              document.getElementById("status").innerText = "✅ " + data;
            })
            .catch(err => {
              document.getElementById("status").innerText = "❌ Backend not reachable";
            });
        }
      </script>

    </body>
    </html>